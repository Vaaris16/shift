name: Build Tauri App

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24   

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf

      - run: npm install
      - run: npm run tauri build

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/${{ matrix.os == 'macos-latest' && 'dmg/*.dmg' || '' }}
            src-tauri/target/release/bundle/${{ matrix.os == 'windows-latest' && 'msi/*.msi' || '' }}
            src-tauri/target/release/bundle/${{ matrix.os == 'windows-latest' && 'exe/*.exe' || '' }}
            src-tauri/target/release/bundle/${{ matrix.os == 'ubuntu-latest' && 'appimage/*.AppImage' || '' }}
            src-tauri/target/release/bundle/${{ matrix.os == 'ubuntu-latest' && 'deb/*.deb' || '' }}
            src-tauri/target/release/bundle/**/shift*.tar.gz
    fail_on_unmatched_files: false
